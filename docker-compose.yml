services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: epms
      POSTGRES_USER: epms
      POSTGRES_PASSWORD: epms
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epms -d epms"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - epms_postgres:/var/lib/postgresql/data

volumes:
  epms_postgres:
