services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: epms
      POSTGRES_USER: epms
      POSTGRES_PASSWORD: epms
    ports:
      - "127.0.0.1:5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epms -d epms"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - epms_postgres:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      target: migration
    image: epms-migrate:local
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://epms:epms@postgres:5432/epms
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runtime
    image: epms-app:local
    restart: unless-stopped
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://epms:epms@postgres:5432/epms
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  epms_postgres:
